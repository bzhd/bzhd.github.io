<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>洛克王国世界精灵 JSON 表格解析器</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#172033;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#2563eb;
      --brand2:#1d4ed8;
      --soft:#eef4ff;
      --ok:#0f766e;
      --warn:#b45309;
      --danger:#b91c1c;
      --shadow:0 10px 30px rgba(15,23,42,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f8fbff 0%,var(--bg) 100%);
    }
    header{
      padding:28px 24px 14px;
      max-width:1280px;
      margin:0 auto;
    }
    h1{margin:0 0 8px;font-size:28px;letter-spacing:.2px}
    .subtitle{margin:0;color:var(--muted);line-height:1.65}
    main{
      max-width:1280px;
      margin:0 auto;
      padding:12px 24px 32px;
    }
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
      margin-bottom:16px;
    }
    .grid{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
    }
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    input[type="url"], input[type="text"], textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:14px;
      background:#fff;
      outline:none;
    }
    input[type="url"]:focus, input[type="text"]:focus, textarea:focus{
      border-color:var(--brand);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }
    textarea{
      min-height:150px;
      resize:vertical;
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    }
    button{
      border:0;
      background:var(--brand);
      color:#fff;
      border-radius:12px;
      padding:11px 15px;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;
      transition:.15s ease;
    }
    button:hover{background:var(--brand2);transform:translateY(-1px)}
    button.secondary{background:#111827}
    button.ghost{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
    }
    button.ghost:hover{background:#f9fafb}
    button.danger{background:var(--danger)}
    .hint{
      margin-top:8px;
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }
    .tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
    .tab{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      font-size:13px;
    }
    .tab.active{
      background:var(--soft);
      color:var(--brand2);
      border-color:#bfdbfe;
      font-weight:600;
    }
    .hidden{display:none}
    .status{
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      margin-top:12px;
      line-height:1.55;
      background:#f3f4f6;
      color:#374151;
    }
    .status.ok{background:#ecfdf5;color:var(--ok)}
    .status.warn{background:#fffbeb;color:var(--warn)}
    .status.err{background:#fef2f2;color:var(--danger)}
    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .stats{display:flex;gap:8px;flex-wrap:wrap}
    .pill{
      background:#f3f4f6;
      border:1px solid var(--line);
      color:#374151;
      border-radius:999px;
      padding:7px 10px;
      font-size:13px;
    }
    .field-panel{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .field-group{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#fff;
    }
    .field-group h3{
      margin:0 0 8px;
      font-size:14px;
    }
    .field-list{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
    }
    label.check{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#374151;
      background:#f9fafb;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 9px;
      cursor:pointer;
      user-select:none;
    }
    label.check input{margin:0}
    .table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      max-height:68vh;
    }
    table{
      border-collapse:separate;
      border-spacing:0;
      width:max-content;
      min-width:100%;
      font-size:13px;
    }
    th,td{
      padding:10px 12px;
      border-bottom:1px solid var(--line);
      border-right:1px solid var(--line);
      vertical-align:top;
      max-width:360px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    th{
      position:sticky;
      top:0;
      z-index:2;
      background:#f8fafc;
      text-align:left;
      font-weight:700;
      color:#111827;
      white-space:nowrap;
    }
    tr:hover td{background:#f9fbff}
    th:first-child, td:first-child{
      position:sticky;
      left:0;
      z-index:1;
      background:#fff;
    }
    th:first-child{
      z-index:3;
      background:#f8fafc;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      padding:30px;
      border:1px dashed var(--line);
      border-radius:14px;
      background:#fff;
    }
    details{
      margin-top:10px;
    }
    summary{
      cursor:pointer;
      color:var(--brand2);
      font-size:14px;
    }
    @media (max-width:800px){
      .grid{grid-template-columns:1fr}
      .field-panel{grid-template-columns:1fr}
      header,main{padding-left:14px;padding-right:14px}
      h1{font-size:23px}
    }
  </style>
</head>
<body>
<header>
  <h1>洛克王国世界精灵 JSON 表格解析器</h1>
  <p class="subtitle">保留“基础信息、属性生态、种族值、成长、繁殖、行为生态、剧情/系统定位”七类字段。支持输入 JSON 链接、粘贴 JSON、上传本地 JSON，并导出 CSV。</p>
</header>

<main>
  <section class="panel">
    <div class="tabs">
      <button class="tab active" data-tab="urlBox" type="button">JSON 链接</button>
      <button class="tab" data-tab="pasteBox" type="button">粘贴 JSON</button>
      <button class="tab" data-tab="uploadBox" type="button">上传文件</button>
    </div>

    <div id="urlBox" class="tabbox">
      <div class="grid">
        <input id="jsonUrl" type="url" value="https://raw.githubusercontent.com/aoe-top/rocom.aoe.top/refs/heads/main/public/data/tables/PETBASE_CONF.json" placeholder="请输入 JSON 链接，例如 https://example.com/petbase.json" />
        <button id="loadUrlBtn" type="button">解析链接</button>
      </div>
      <div class="hint">注意：如果目标网站没有开放 CORS，浏览器会阻止直接读取链接；此时请用“粘贴 JSON”或“上传文件”。</div>
    </div>

    <div id="pasteBox" class="tabbox hidden">
      <textarea id="jsonText" placeholder='把 JSON 粘贴到这里，例如 {"RocoDataRows": {...}}'></textarea>
      <div class="row" style="margin-top:10px">
        <button id="parseTextBtn" type="button">解析粘贴内容</button>
        <button id="clearTextBtn" class="ghost" type="button">清空</button>
      </div>
    </div>

    <div id="uploadBox" class="tabbox hidden">
      <input id="jsonFile" type="file" accept=".json,.txt,application/json,text/plain" />
      <div class="row" style="margin-top:10px">
        <button id="parseFileBtn" type="button">解析文件</button>
      </div>
    </div>

    <div id="status" class="status hidden"></div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <div class="row" style="flex:1;min-width:260px">
        <input id="searchInput" type="text" placeholder="搜索表格：名称、描述、ID、标签等" />
      </div>
      <div class="row">
        <button id="exportAllBtn" class="secondary" type="button">导出全部 CSV</button>
        <button id="exportFilteredBtn" class="ghost" type="button">导出当前筛选 CSV</button>
      </div>
    </div>
    <div class="stats" id="stats">
      <span class="pill">待解析</span>
    </div>

    <details>
      <summary>字段选择 / 七类字段</summary>
      <div class="row" style="margin:12px 0">
        <button id="selectAllBtn" class="ghost" type="button">全选</button>
        <button id="selectDefaultBtn" class="ghost" type="button">恢复默认</button>
        <button id="selectNoneBtn" class="ghost" type="button">全不选</button>
      </div>
      <div id="fieldPanel" class="field-panel"></div>
    </details>
  </section>

  <section class="panel">
    <div id="tableArea" class="empty">还没有数据。请输入 JSON 链接、粘贴 JSON 或上传文件。</div>
  </section>
</main>

<script>
const FIELD_GROUPS = [
  {
    group: "1. 基础信息",
    fields: [
      ["id","精灵ID"],
      ["pictorial_book_id","图鉴ID"],
      ["name","名称"],
      ["form","形态"],
      ["description","官方描述"],
      ["quality","品质"],
      ["stage","当前阶段"],
      ["stength_stage","成长阶段"],
      ["pet_scroe","战力评分"]
    ]
  },
  {
    group: "2. 属性 / 生态相关",
    fields: [
      ["unit_type","属性类型"],
      ["world_nature","世界行为类型"],
      ["pet_classis_id","精灵分类"],
      ["ecology_feature","生态标签"],
      ["enjoy_field_type","喜欢环境"],
      ["hate_field_type","厌恶环境"],
      ["move_type","移动方式"]
    ]
  },
  {
    group: "3. 种族值",
    fields: [
      ["hp_max_race","HP种族"],
      ["phy_attack_race","物攻种族"],
      ["spe_attack_race","魔攻种族"],
      ["phy_defence_race","物防种族"],
      ["spe_defence_race","魔防种族"],
      ["speed_race","速度种族"],
      ["SUM_race","总种族值"]
    ]
  },
  {
    group: "4. 成长 / 天分相关",
    fields: [
      ["base_point_limit","努力值上限"],
      ["grow_x_individuality","成长倍率"],
      ["individuality_lower_limit","个体值下限"],
      ["individuality_upper_limit","个体值上限"],
      ["talent_random_id","天赋池ID"],
      ["talent_normal_chance","一般般的天分概率"],
      ["talent_good_chance","还不错的天分概率"],
      ["talent_amazing_chance","相当好的天分概率"],
      ["talent_perfect_chance","了不起的天分概率"]
    ]
  },
  {
    group: "5. 繁殖 / 进化",
    fields: [
      ["pet_egg","精灵蛋ID"],
      ["egg_group","蛋组"],
      ["evolution_pet_id","进化目标"],
      ["pet_evolution_id","进化线路"]
    ]
  },
  {
    group: "6. 行为生态 / 体型",
    fields: [
      ["habit_1","行为习惯"],
      ["pet_text","精灵叫声"],
      ["pet_style","语言风格"],
      ["can_swim","是否可游泳"],
      ["weight_low","体重下限"],
      ["weight_high","体重上限"],
      ["height_low","身高下限"],
      ["height_high","身高上限"]
    ]
  },
  {
    group: "7. 剧情 / 系统定位",
    fields: [
      ["boss_type","Boss类型"],
      ["show_tag","展示标签"],
      ["pet_bond_id","羁绊ID"],
      ["npc_id","NPC编号"],
      ["home_npc_id","家园NPC编号"],
      ["pet_track_npc_id","追踪NPC编号"],
      ["wish_number","心愿值"],
      ["ban_free","是否禁止自由获取"]
    ]
  }
];

const FIELD_LABELS = Object.fromEntries(FIELD_GROUPS.flatMap(g => g.fields));
const DEFAULT_FIELDS = FIELD_GROUPS.flatMap(g => g.fields.map(f => f[0]));
let selectedFields = new Set(DEFAULT_FIELDS);
let rawRows = [];
let filteredRows = [];

const $ = sel => document.querySelector(sel);

function showStatus(message, type="ok"){
  const el = $("#status");
  el.className = "status " + type;
  el.textContent = message;
  el.classList.remove("hidden");
}

function hideStatus(){
  $("#status").classList.add("hidden");
}

function valueToCell(value){
  if (value === undefined || value === null) return "";
  if (Array.isArray(value)) return value.map(v => typeof v === "object" ? JSON.stringify(v) : String(v)).join(" | ");
  if (typeof value === "object") return JSON.stringify(value, null, 0);
  return String(value);
}

function getValue(row, key){
  if (key === "pet_scroe" && row.pet_scroe === undefined && row.pet_score !== undefined) return row.pet_score;
  return row[key];
}

function normalizeRows(json){
  if (!json) return [];

  if (json.RocoDataRows && typeof json.RocoDataRows === "object") {
    if (Array.isArray(json.RocoDataRows)) return json.RocoDataRows;
    return Object.values(json.RocoDataRows);
  }

  if (Array.isArray(json)) return json;

  const commonKeys = ["data","rows","items","list","result","records"];
  for (const key of commonKeys) {
    if (Array.isArray(json[key])) return json[key];
    if (json[key] && typeof json[key] === "object") {
      const vals = Object.values(json[key]);
      if (vals.length && vals.every(v => v && typeof v === "object" && !Array.isArray(v))) return vals;
    }
  }

  if (typeof json === "object") {
    const vals = Object.values(json);
    if (vals.length && vals.every(v => v && typeof v === "object" && !Array.isArray(v))) return vals;
    return [json];
  }

  return [];
}

function parseJsonText(text){
  const trimmed = text.trim();
  if (!trimmed) throw new Error("JSON 内容为空。");
  return JSON.parse(trimmed);
}

async function loadFromUrl(){
  const url = $("#jsonUrl").value.trim();
  if (!url) {
    showStatus("请先输入 JSON 链接。", "warn");
    return;
  }
  hideStatus();
  try {
    const res = await fetch(url, {cache:"no-store"});
    if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
    const text = await res.text();
    const json = parseJsonText(text);
    applyData(json, "链接解析成功");
  } catch (err) {
    showStatus("链接读取失败：" + err.message + "。如果是 CORS 限制，请改用“粘贴 JSON”或“上传文件”。", "err");
  }
}

function applyData(json, successPrefix="解析成功"){
  rawRows = normalizeRows(json).filter(r => r && typeof r === "object");
  if (!rawRows.length) {
    filteredRows = [];
    render();
    showStatus("解析到了 JSON，但没有找到可展示的精灵行数据。请检查结构是否为 RocoDataRows 或对象数组。", "warn");
    return;
  }
  filterRows();
  showStatus(`${successPrefix}：共读取 ${rawRows.length} 行精灵数据，当前显示 ${filteredRows.length} 行。`, "ok");
}

function filterRows(){
  const q = $("#searchInput").value.trim().toLowerCase();
  if (!q) {
    filteredRows = rawRows.slice();
  } else {
    filteredRows = rawRows.filter(row => {
      return DEFAULT_FIELDS.some(key => valueToCell(getValue(row,key)).toLowerCase().includes(q));
    });
  }
  render();
}

function renderStats(){
  const fieldsCount = selectedFields.size;
  const maxSum = rawRows.length ? Math.max(...rawRows.map(r => Number(r.SUM_race || 0))) : 0;
  const avgSum = rawRows.length ? Math.round(rawRows.reduce((s,r)=>s+Number(r.SUM_race || 0),0) / rawRows.length) : 0;
  $("#stats").innerHTML = `
    <span class="pill">总行数：${rawRows.length}</span>
    <span class="pill">当前显示：${filteredRows.length}</span>
    <span class="pill">字段数：${fieldsCount}</span>
    <span class="pill">最高总种族值：${maxSum || "-"}</span>
    <span class="pill">平均总种族值：${avgSum || "-"}</span>
  `;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, m => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}

function renderTable(){
  const fields = DEFAULT_FIELDS.filter(f => selectedFields.has(f));
  const area = $("#tableArea");

  if (!rawRows.length) {
    area.className = "empty";
    area.textContent = "还没有数据。请输入 JSON 链接、粘贴 JSON 或上传文件。";
    return;
  }
  if (!fields.length) {
    area.className = "empty";
    area.textContent = "当前没有选择任何字段。请在“字段选择”里至少勾选一个字段。";
    return;
  }
  if (!filteredRows.length) {
    area.className = "empty";
    area.textContent = "没有匹配当前搜索条件的数据。";
    return;
  }

  area.className = "table-wrap";
  const thead = fields.map(f => `<th title="${escapeHtml(f)}">${escapeHtml(FIELD_LABELS[f] || f)}<br><small style="color:#6b7280">${escapeHtml(f)}</small></th>`).join("");
  const tbody = filteredRows.map(row => {
    const tds = fields.map(f => `<td>${escapeHtml(valueToCell(getValue(row, f)))}</td>`).join("");
    return `<tr>${tds}</tr>`;
  }).join("");
  area.innerHTML = `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function render(){
  renderStats();
  renderTable();
}

function renderFieldPanel(){
  const panel = $("#fieldPanel");
  panel.innerHTML = FIELD_GROUPS.map(group => {
    const checks = group.fields.map(([key,label]) => `
      <label class="check" title="${escapeHtml(key)}">
        <input type="checkbox" data-field="${escapeHtml(key)}" ${selectedFields.has(key) ? "checked" : ""}>
        ${escapeHtml(label)}
      </label>
    `).join("");
    return `<div class="field-group"><h3>${escapeHtml(group.group)}</h3><div class="field-list">${checks}</div></div>`;
  }).join("");

  panel.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", e => {
      const key = e.target.dataset.field;
      if (e.target.checked) selectedFields.add(key);
      else selectedFields.delete(key);
      render();
    });
  });
}

function toCsv(rows){
  const fields = DEFAULT_FIELDS.filter(f => selectedFields.has(f));
  const header = fields.map(f => FIELD_LABELS[f] || f);
  const keys = fields;
  const escapeCsv = v => {
    const s = valueToCell(v);
    return /[",\n\r]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  };
  const lines = [];
  lines.push(header.map(escapeCsv).join(","));
  lines.push(keys.map(escapeCsv).join(",")); // 第二行保留原始字段名，方便二次处理
  for (const row of rows) {
    lines.push(keys.map(k => escapeCsv(getValue(row,k))).join(","));
  }
  return "\ufeff" + lines.join("\n");
}

function downloadCsv(rows, filename){
  if (!rows.length) {
    showStatus("没有可导出的数据。", "warn");
    return;
  }
  const csv = toCsv(rows);
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tabbox").forEach(box => box.classList.add("hidden"));
    $("#" + btn.dataset.tab).classList.remove("hidden");
  });
});

$("#loadUrlBtn").addEventListener("click", loadFromUrl);
$("#jsonUrl").addEventListener("keydown", e => { if (e.key === "Enter") loadFromUrl(); });

$("#parseTextBtn").addEventListener("click", () => {
  try {
    const json = parseJsonText($("#jsonText").value);
    applyData(json, "粘贴内容解析成功");
  } catch (err) {
    showStatus("JSON 解析失败：" + err.message, "err");
  }
});

$("#clearTextBtn").addEventListener("click", () => {
  $("#jsonText").value = "";
});

$("#parseFileBtn").addEventListener("click", async () => {
  const file = $("#jsonFile").files[0];
  if (!file) {
    showStatus("请先选择 JSON 文件。", "warn");
    return;
  }
  try {
    const text = await file.text();
    const json = parseJsonText(text);
    applyData(json, "文件解析成功");
  } catch (err) {
    showStatus("文件解析失败：" + err.message, "err");
  }
});

$("#searchInput").addEventListener("input", filterRows);

$("#exportAllBtn").addEventListener("click", () => {
  downloadCsv(rawRows, "roco_pet_table_all.csv");
});

$("#exportFilteredBtn").addEventListener("click", () => {
  downloadCsv(filteredRows, "roco_pet_table_filtered.csv");
});

$("#selectAllBtn").addEventListener("click", () => {
  selectedFields = new Set(DEFAULT_FIELDS);
  renderFieldPanel();
  render();
});

$("#selectDefaultBtn").addEventListener("click", () => {
  selectedFields = new Set(DEFAULT_FIELDS);
  renderFieldPanel();
  render();
});

$("#selectNoneBtn").addEventListener("click", () => {
  selectedFields = new Set();
  renderFieldPanel();
  render();
});

renderFieldPanel();
